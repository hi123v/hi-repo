{% extends 'blog/base.html' %}

{% block content %}
  <div class="container mt-4">
    <h2>Choose your grade</h2>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        {% for grade in grades %}
          <div class="form-check">
            <input class="form-check-input" type="radio" name="grade" id="grade{{ grade.pk }}" value="{{ grade.pk }}">
            <label class="form-check-label" for="grade{{ grade.pk }}">{{ grade.name }}</label>
          </div>
        {% empty %}
          <p>No grades configured. Contact an admin.</p>
        {% endfor %}
      </div>
      <button class="btn btn-primary mt-3" type="submit">Continue</button>
    </form>
  </div>
{% endblock %}
