{% extends "blog/base.html" %}
{% load static %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="row w-100 justify-content-center">
        <div class="col-md-4 mb-4">
            <div class="card text-center shadow-lg">
                <div class="card-body d-flex flex-column justify-content-center align-items-center" style="height: 450px;">
                    <h3 class="card-title mb-4">Teacher</h3>
                    <a href="{% url 'login' %}?user_type=teacher" class="btn btn-light btn-lg w-75 d-flex justify-content-center align-items-center" style="height: 350px;">
                        <img src="{% static 'sprites/teacher.png' %}" alt="Teacher" style="height:180px;">
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="card text-center shadow-lg">
                <div class="card-body d-flex flex-column justify-content-center align-items-center" style="height: 450px;">
                    <h3 class="card-title mb-4">Parent</h3>
                    <a href="{% url 'login' %}?user_type=parent" class="btn btn-light btn-lg w-75 d-flex justify-content-center align-items-center" style="height: 350px;">
                        <img src="{% static 'sprites/parent.png' %}" alt="Parent" style="height:180px;">
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="card text-center shadow-lg">
                <div class="card-body d-flex flex-column justify-content-center align-items-center" style="height: 450px;">
                    <h3 class="card-title mb-4">Student</h3>
                    <a href="{% url 'student-login' %}" class="btn btn-light btn-lg w-75 d-flex justify-content-center align-items-center" style="height: 350px;">
                        <img src="{% static 'sprites/student.png' %}" alt="Student" style="height:180px;">
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="border-top pt-3">
    <small class="text-muted">
        Need An Account? <a class="ml-2" href="{% url 'register' %}">Sign Up Now</a>
    </small>
</div>
{% endblock content %}
