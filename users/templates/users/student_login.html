{% extends "blog/base.html" %}
{% block content %}
<h2>Student Login</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Submit</button>
    {% if form.non_field_errors %}
        <div class="alert alert-danger mt-2">
            {{ form.non_field_errors }}
        </div>
    {% endif %}
</form>
{% endblock %}
