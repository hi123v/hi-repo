{% extends "blog/base.html" %}
{% block content %}
<h2>Student Login</h2>
<form method="post">
    {% csrf_token %}
    {{ form.username|as_crispy_field }}
    {{ form.password|as_crispy_field }}
    {{ form.parent_email|as_crispy_field }}
    <button type="submit" class="btn btn-primary">Send Code</button>
</form>
{% endblock %}
