{% extends "blog/base.html" %}
{% block content %}
    <div class="container">
        <h1 class="mt-4">Courses</h1>
        <div class="row">
            {% for course in courses|slice:":2" %}
                <div class="col-md-6 mb-4">
                    <a href="{% url 'course-detail' course.id %}" class="btn btn-lg btn-primary btn-block">
                        {{ course.name }}
                    </a>
                </div>
            {% endfor %}
        </div>
    </div>
{% endblock %}
